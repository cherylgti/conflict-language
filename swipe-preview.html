<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conflict Language – bakat.id</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --rose: #C8405A;
  --rose-light: #F2A0B0;
  --rose-pale: #FDF0F2;
  --rose-deep: #7D1A2E;
  --cream: #FBF6F0;
  --warm-white: #FEFCFA;
  --blush: #F7D6DC;
  --ink: #1C1016;
  --ink-mid: #4A2D35;
  --ink-muted: #8C6870;
  --gold: #C4923A;
  --gold-light: #F0D5A0;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--warm-white); color: var(--ink);
  height: 100dvh; overflow: hidden;
}
.bg {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 50% 20%, rgba(200,64,90,0.06) 0%, transparent 65%);
  pointer-events: none;
}
.app {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  height: 100dvh; max-width: 430px; margin: 0 auto; width: 100%;
}

/* ── HEADER ─────────────────────────────── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 10px; flex-shrink: 0;
}
.logo      { font-size: 16px; font-weight: 700; letter-spacing: 0.02em; color: var(--ink); }
.lang      { font-size: 12px; font-weight: 500; color: var(--ink-muted); cursor: pointer; }
.q-counter { font-size: 11px; font-weight: 500; color: var(--ink-muted); letter-spacing: 0.04em; }

.back-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(200,64,90,0.06);
  border: 1px solid rgba(200,64,90,0.15);
  color: var(--ink-mid); font-size: 20px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
  transition: background 0.18s, transform 0.15s;
  display: none; /* hidden on Q1, shown via JS */
}
.back-btn:active { transform: scale(0.91); background: rgba(200,64,90,0.12); }

/* ── PROGRESS BAR ───────────────────────── */
.progress-wrap { padding: 0 20px 2px; flex-shrink: 0; }
.progress-track { height: 3px; border-radius: 3px; background: rgba(200,64,90,0.10); overflow: hidden; }
.progress-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, var(--rose-light), var(--rose));
  transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ── QUESTION ───────────────────────────── */
.question-wrap { flex-shrink: 0; padding: 16px 24px 8px; }
.q-eyebrow {
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--rose); margin-bottom: 5px;
  transition: color 0.3s;
}
.q-eyebrow.rank   { color: var(--rose); }
.q-eyebrow.binary { color: var(--rose); }
.q-eyebrow.split  { color: var(--rose-deep); }
.q-text {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(18px, 5.2vw, 22px);
  font-weight: 700; letter-spacing: -0.01em; line-height: 1.2;
  color: var(--ink); transition: opacity 0.22s ease;
}

/* ══════════════════════════════════════════
   SWIPE — stacked deck
══════════════════════════════════════════ */
.cards-stage {
  flex: 1; min-height: 0; position: relative;
  display: flex; align-items: center; justify-content: center;
  perspective: 1000px; user-select: none;
}
.card {
  position: absolute;
  width: 200px; height: 268px;
  border-radius: 16px;
  background: linear-gradient(180deg, #f7ede0 0%, #ede2d0 100%);
  padding: 8px;
  box-shadow:
    rgba(200,64,90,0.12) 0 6px 20px,
    rgba(255,248,245,0.6) 2px 2px 2px inset,
    rgba(0,0,0,0.06) -1px -1px 2px inset,
    rgba(200,64,90,0.08) 0 18px 44px;
  cursor: pointer; touch-action: none;
  transition: transform 0.38s cubic-bezier(0.25,1,0.5,1),
              box-shadow 0.38s ease, opacity 0.38s ease;
}
.card[data-pos="center"] {
  z-index: 10; opacity: 1; cursor: grab;
  transform: translate3d(0,0,0) rotate(3deg);
  box-shadow:
    rgba(200,64,90,0.20) 0 0 26px 5px,
    rgba(255,248,245,0.6) 2px 2px 2px inset,
    rgba(0,0,0,0.06)    -1px -1px 2px inset,
    rgba(200,64,90,0.10) 0 18px 44px;
}
.card[data-pos="center"]:active { cursor: grabbing; }
.card[data-pos="center"].peek-left  { transform: translate3d( 50px,0,0) rotate(3deg); }
.card[data-pos="center"].peek-right { transform: translate3d(-50px,0,0) rotate(3deg); }
.card[data-pos="left"]      { z-index:5; transform:translate(-100px,12px) rotate(-18deg) scale(0.68); opacity:0.88; }
.card[data-pos="right"]     { z-index:5; transform:translate( 100px,12px) rotate( 18deg) scale(0.68); opacity:0.88; }
.card[data-pos="far-left"]  { z-index:2; transform:translate3d(-180px,0,-700px) rotate(-24deg); opacity:0.45; pointer-events:none; }
.card[data-pos="far-right"] { z-index:2; transform:translate3d( 180px,0,-700px) rotate( 24deg); opacity:0.45; pointer-events:none; }
.card[data-pos="hidden"]    { z-index:0; transform:translate3d(0,0,-900px) rotate(0deg); opacity:0; pointer-events:none; }

.card.is-selected[data-pos="center"] {
  box-shadow:
    rgba(200,64,90,0.55) 0 0 36px 8px,
    rgba(255,248,245,0.6) 2px 2px 2px inset,
    rgba(0,0,0,0.04)    -1px -1px 2px inset;
}
.card.dragging { transition: none !important; }
.card[data-pos="center"].hint-right { box-shadow: rgba(196,146,58,0.55) 0 0 32px 8px, rgba(255,248,245,0.6) 2px 2px 2px inset; }
.card[data-pos="center"].hint-left  { box-shadow: rgba(125,26,46,0.55) 0 0 32px 8px, rgba(255,248,245,0.6) 2px 2px 2px inset; }

/* swipe checkmark badge */
.card-check {
  position: absolute; top: 10px; right: 10px;
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--rose);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #fff;
  box-shadow: 0 2px 8px rgba(200,64,90,0.40);
  opacity: 0; transform: scale(0.5);
  transition: opacity 0.22s, transform 0.22s cubic-bezier(0.34,1.4,0.64,1);
  z-index: 20; pointer-events: none;
}
.card.is-selected[data-pos="center"] .card-check { opacity:1; transform:scale(1); }

/* ══════════════════════════════════════════
   RANK — vertical tap-to-rank list
══════════════════════════════════════════ */
.cards-stage.rank-mode {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 4px 18px 4px;
  perspective: none;
  align-items: stretch;
  justify-content: flex-start;
  overflow-y: auto;
}
.rank-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 16px;
  border-radius: 16px;
  background: rgba(200,64,90,0.04);
  border: 1.5px solid rgba(200,64,90,0.12);
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.18s ease;
}
.rank-row:active { transform: scale(0.97); }
.rank-row.rank-done {
  border-color: rgba(200,64,90,0.45);
  box-shadow: 0 0 20px rgba(200,64,90,0.12);
}
.rank-row-badge {
  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
  background: rgba(200,64,90,0.06);
  border: 1.5px solid rgba(200,64,90,0.18);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: var(--ink-mid);
  transition: background 0.25s, border-color 0.25s,
              transform 0.35s cubic-bezier(0.34,1.6,0.64,1);
}
.rank-row-badge:empty::after {
  content: '';
  display: block;
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(200,64,90,0.25);
}
.rank-row.rank-done .rank-row-badge {
  background: var(--rose);
  border-color: transparent;
  color: #fff;
  transform: scale(1.08);
}
.rank-row-label {
  font-size: 14px; font-weight: 400; line-height: 1.3;
  color: var(--ink-mid);
}

/* rank-strip kept in DOM but never shown */
.rank-strip { display: none !important; }

/* ══════════════════════════════════════════
   BINARY — 2-card this-or-that layout
══════════════════════════════════════════ */
.cards-stage.binary-mode {
  display: flex;
  flex-direction: row;
  align-items: stretch;
  padding: 12px 16px 10px;
  gap: 0;
  perspective: none;
}
.binary-mode .card {
  position: relative;
  flex: 1;
  height: 100%;
  min-height: 210px;
  transform: scale(1) translateY(0px) !important;
  opacity: 1 !important;
  cursor: pointer;
  transition:
    transform 0.38s cubic-bezier(0.25,1,0.5,1),
    box-shadow 0.38s ease,
    opacity    0.38s ease;
  touch-action: auto;
}
.binary-mode .card.b-selected {
  transform: scale(1.05) translateY(-8px) !important;
  box-shadow:
    rgba(200,64,90,0.55) 0 0 36px 10px,
    rgba(255,248,245,0.6) 2px 2px 2px inset,
    rgba(0,0,0,0.04)    -1px -1px 2px inset !important;
}
.binary-mode .card.b-unselected {
  transform: scale(0.91) translateY(8px) !important;
  opacity: 0.40 !important;
}
.binary-mode .card.b-selected .card-check { opacity:1; transform:scale(1); }

/* VS divider between the two binary cards */
.vs-divider {
  width: 52px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 15;
  pointer-events: none;
}
.vs-divider::before,
.vs-divider::after {
  content: '';
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 1px;
  background: linear-gradient(to bottom, transparent, rgba(200,64,90,0.25), transparent);
}
.vs-divider::before { top: 0;              bottom: calc(50% + 22px); }
.vs-divider::after  { top: calc(50% + 22px); bottom: 0; }
.vs-label {
  width: 38px; height: 38px; border-radius: 50%;
  background: rgba(200,64,90,0.06);
  border: 1.5px solid rgba(200,64,90,0.20);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 500; letter-spacing: 0.07em;
  color: var(--ink-muted);
}

/* ══════════════════════════════════════════
   SPLIT — diagonal screen divide
══════════════════════════════════════════ */
.cards-stage.split-mode {
  flex: 1; min-height: 0;
  position: relative;
  overflow: hidden;
  border-radius: 20px;
  margin: 10px 16px 6px;
  perspective: none;
  display: block;
}
.split-half {
  position: absolute; inset: 0;
  cursor: pointer;
  transition: clip-path 0.48s cubic-bezier(0.4,0,0.2,1),
              filter     0.38s ease;
  will-change: clip-path;
}
/* neutral 50/50 diagonal: blade runs top-57% → bottom-42% */
.split-half-a { clip-path: polygon(0 0, 57% 0, 42% 100%, 0 100%); }
.split-half-b { clip-path: polygon(57% 0, 100% 0, 100% 100%, 42% 100%); }

/* A selected → blade shifts right */
.split-mode.sel-a .split-half-a { clip-path: polygon(0 0, 71% 0, 56% 100%, 0 100%); }
.split-mode.sel-a .split-half-b { clip-path: polygon(71% 0, 100% 0, 100% 100%, 56% 100%); filter: brightness(0.45); }
/* B selected → blade shifts left */
.split-mode.sel-b .split-half-a { clip-path: polygon(0 0, 43% 0, 28% 100%, 0 100%); filter: brightness(0.45); }
.split-mode.sel-b .split-half-b { clip-path: polygon(43% 0, 100% 0, 100% 100%, 28% 100%); }

.split-bg { position: absolute; inset: 0; }

.split-label {
  position: absolute; bottom: 22%;
  font-size: 13px; font-weight: 700; color: #fff;
  line-height: 1.35; text-align: center;
  text-shadow: 0 1px 5px rgba(0,0,0,0.7);
  pointer-events: none;
  transition: opacity 0.3s;
}
.split-half-a .split-label { left: 5%; width: 40%; }
.split-half-b .split-label { right: 5%; width: 40%; }

.split-check {
  position: absolute; top: 14px;
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--rose);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff;
  box-shadow: 0 2px 8px rgba(200,64,90,0.40);
  opacity: 0; transform: scale(0.3) rotate(-30deg);
  transition: opacity 0.25s, transform 0.4s cubic-bezier(0.34,1.6,0.64,1);
  pointer-events: none; z-index: 10;
}
.split-half-a .split-check { left: 12px; }
.split-half-b .split-check { right: 12px; }
.split-mode.sel-a .split-half-a .split-check,
.split-mode.sel-b .split-half-b .split-check { opacity: 1; transform: scale(1) rotate(0deg); }

.split-blade {
  position: absolute; inset: 0;
  pointer-events: none; z-index: 8;
  transition: opacity 0.3s;
}

/* ── SHARED CARD INNER ───────────────────── */
.card-inner { width:100%; height:100%; border-radius:9px; overflow:hidden; position:relative; }
.ci-bg { position:absolute; inset:0; }
.ci-gl { position:absolute; bottom:0; left:-40%; width:180%; height:65%; background:radial-gradient(50% 50%,#ff5b00 20%,rgba(255,91,0,0)); opacity:0.85; pointer-events:none; }
.ci-gr { position:absolute; bottom:0; right:-40%; width:130%; height:55%; background:radial-gradient(50% 50%,#422fb7,rgba(66,47,183,0)); opacity:0.85; pointer-events:none; }
.ci-gc { position:absolute; bottom:-5%; left:10%; width:80%; height:40%; background:radial-gradient(50% 50%,#ffba01,rgba(255,186,1,0)); opacity:0.85; pointer-events:none; }
.ci-emoji {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-62%);
  font-size:54px; line-height:1;
  filter:drop-shadow(0 3px 10px rgba(0,0,0,0.45));
  pointer-events:none; user-select:none;
}
.ci-label {
  position:absolute; bottom:0; left:0; right:0;
  padding:32px 10px 12px;
  background:linear-gradient(transparent,rgba(0,0,0,0.72));
  font-size:12px; font-weight:700; color:#fff;
  text-align:center; line-height:1.3;
  text-shadow:0 1px 3px rgba(0,0,0,0.7);
}
.rank-row-emoji { font-size:20px; flex-shrink:0; line-height:1; }

/* ── SWIPE HINT (hidden on rank) ─────────── */
.swipe-hint {
  flex-shrink: 0; text-align: center; padding: 0 0 4px;
  font-size: 11px; font-weight: 400; color: var(--ink-muted); letter-spacing: 0.04em;
  transition: opacity 0.2s;
}
.swipe-hint.hidden { display: none; }

/* ── BOTTOM ─────────────────────────────── */
.bottom {
  flex-shrink: 0;
  padding: 8px 22px calc(24px + env(safe-area-inset-bottom));
  display: flex; flex-direction: column; align-items: center; gap: 9px;
}
.dots { display:flex; gap:7px; align-items:center; height:10px; }
.dot  { width:6px; height:6px; border-radius:50%; background:rgba(200,64,90,0.18); transition:background 0.22s,transform 0.22s; }
.dot.active { background:var(--rose); transform:scale(1.25); }

.hint-text {
  font-size: 12.5px; font-weight: 400;
  color: var(--ink-muted); opacity: 0.7; text-align: center; min-height: 20px;
  transition: opacity 0.2s;
}
.hint-text.selected { opacity: 1; color: var(--ink-mid); }

/* ══════════════════════════════════════════
   3D SCENE LAYER
══════════════════════════════════════════ */
.scene-layer {
  position: fixed; top: 0; bottom: 0;
  left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  z-index: 0; pointer-events: none; overflow: hidden;
}
.scene {
  position: absolute; inset: 0;
  opacity: 0; transition: opacity 1.0s ease;
  pointer-events: none;
}
.scene.active { opacity: 1; }
.fobj { position: absolute; }

/* ── 3D model ornament ─────────────────── */
.scene-3d {
  position: absolute;
  pointer-events: none;
}

/* ── float / rotation keyframes ─── */
@keyframes floatA {
  0%,100% { transform: translateY(0px) rotate(0deg); }
  50%      { transform: translateY(-20px) rotate(6deg); }
}
@keyframes floatB {
  0%,100% { transform: translateY(0px) rotate(0deg); }
  50%      { transform: translateY(-14px) rotate(-5deg); }
}
@keyframes floatC {
  0%,100% { transform: translateY(-7px) rotate(3deg); }
  50%      { transform: translateY(12px) rotate(-3deg); }
}
@keyframes floatD {
  0%,100% { transform: translateY(0px) rotate(0deg) scale(1); }
  50%      { transform: translateY(-10px) rotate(2deg) scale(1.04); }
}
@keyframes rotateCW  { from { transform: rotate(0deg);    } to { transform: rotate(360deg);  } }
@keyframes rotateCCW { from { transform: rotate(0deg);    } to { transform: rotate(-360deg); } }
@keyframes orbitIn   { 0%,100% { transform: translateX(0px); } 50% { transform: translateX(22px); } }
@keyframes orbitOut  { 0%,100% { transform: translateX(0px); } 50% { transform: translateX(-22px); } }
@keyframes shimmer   { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }

.next-btn {
  display:flex; align-items:center;
  background:var(--rose);
  border:none; border-radius:100px; padding:6px;
  box-shadow:0 4px 20px rgba(200,64,90,0.30);
  cursor:pointer; font-family:'DM Sans',system-ui,sans-serif; font-weight:500; font-size:15px;
  width:100%; opacity:0.35; pointer-events:none;
  transition:opacity 0.28s,transform 0.18s,background 0.18s,box-shadow 0.18s;
}
.next-btn.active { opacity:1; pointer-events:all; }
.next-btn.active:hover { background:var(--rose-deep); transform:translateY(-2px); box-shadow:0 8px 28px rgba(200,64,90,0.38); }
.next-btn.active:active { transform:scale(0.97); }
.next-btn.rank-only { display:flex; }
.next-label { color:#fff; flex:1; text-align:center; margin:0 4px 0 18px; font-weight:500; }
.next-icon {
  background:rgba(255,255,255,0.18);
  border-radius:100px; padding:12px 22px;
  color:#fff; font-size:18px; line-height:1;
}

/* ── QUESTION TRANSITIONS ───────────────── */
@keyframes qExit {
  0%   { opacity:1; transform:translateY(0) scale(1); }
  100% { opacity:0; transform:translateY(-60px) scale(0.93); }
}
@keyframes qEnter {
  0%   { opacity:0; transform:translateY(56px) scale(0.95); }
  65%  { opacity:1; transform:translateY(-5px) scale(1.005); }
  100% { opacity:1; transform:translateY(0) scale(1); }
}
.q-exit  { animation: qExit  0.42s cubic-bezier(0.4,0,0.6,1) both; }
.q-enter { animation: qEnter 0.68s cubic-bezier(0.22,1,0.36,1) both; }

/* ── CARD PICK GLOW ─────────────────────── */
@keyframes cardPickGlow {
  0%   { transform:translate3d(0,0,0) scale(1); }
  45%  { transform:translate3d(0,-10px,0) scale(1.08);
         box-shadow:rgba(255,255,255,0.9) 0 0 55px 22px,rgba(0,0,0,0.2) 0 28px 56px; }
  100% { transform:translate3d(0,-28px,0) scale(0.9); opacity:0; }
}
.card-pick { animation:cardPickGlow 0.28s cubic-bezier(0.4,0,1,1) forwards !important; z-index:20; }

</style>
</head>
<body>
<div class="bg"></div>


<!-- ╔═══════════════════════════════════════╗
     ║  3D CONTEXTUAL SCENE OBJECTS          ║
     ╚═══════════════════════════════════════╝ -->
<div class="scene-layer" id="scene-layer">

  <!-- ── Q0: CONFLICT — crystal shards ─── -->
  <div class="scene" id="sc0"></div>

  <!-- ── Q2: fire only (fires + ambient glow injected by JS) ─── -->
  <div class="scene" id="sc1"></div>

  <div class="scene" id="sc2"></div>

  <div class="scene" id="sc3"></div>

  <div class="scene" id="sc4"></div>
  <div class="scene" id="sc5"></div>
  <div class="scene" id="sc6"></div>
  <div class="scene" id="sc-binary"></div>
  <div class="scene" id="sc-19"></div>

  <!-- ── Q9: Awkward (unique scene) ─── -->
  <div class="scene" id="sc-q9"></div>

  <!-- ── Q10: Alert/Danger (unique scene) ─── -->
  <div class="scene" id="sc-q10"></div>

</div>

<div class="app">

  <div class="header">
    <button class="back-btn" id="back-btn" onclick="goBack()">‹</button>
    <div class="logo" id="header-logo">bakat.id</div>
    <div class="lang">ID ▾</div>
    <span class="q-counter" id="q-counter">1 / 5</span>
  </div>

  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div class="question-wrap">
    <div class="q-eyebrow" id="q-eyebrow">Pertanyaan</div>
    <div class="q-text" id="q-text"></div>
  </div>

  <!-- rank progress pips (only visible on rank question) -->
  <div class="rank-strip" id="rank-strip">
    <span>Prioritas kamu</span>
    <div class="rank-strip-pips" id="rank-pips"></div>
  </div>

  <div class="cards-stage" id="cards-stage"></div>

  } else {
    renderDeck();
  }

  renderDots();
  renderBottom();
  updateScene(currentQ);
}

/* ── positions for swipe deck ────────────── */
function posFor(cardIdx) {
  const n = QUESTIONS[currentQ].cards.length;
  // 2-card deck: non-center card peeks from the natural side
  if (n === 2) {
    if (cardIdx === centerIdx) return 'center';
    return cardIdx > centerIdx ? 'right' : 'left';
  }
  const rel    = ((cardIdx - centerIdx) % n + n) % n;
  const signed = rel > n / 2 ? rel - n : rel;
  const clamp  = Math.max(-2, Math.min(2, signed));
  return POS_MAP[((clamp % 6) + 6) % 6];
}
function updatePositions() {
  const isSwipe = QUESTIONS[currentQ].type === 'swipe';
  const n = QUESTIONS[currentQ].cards.length;
  document.querySelectorAll('.card').forEach(c => {
    c.dataset.pos = posFor(+c.dataset.idx);
    c.classList.remove('peek-left', 'peek-right');
    const sel = isSwipe ? (+c.dataset.idx === centerIdx) : (+c.dataset.idx === selectedIdx);
    c.classList.toggle('is-selected', sel);
  });
  if (isSwipe && n === 2) {
    const cc = document.querySelector('.card[data-pos="center"]');
    if (cc) cc.classList.add(centerIdx === 0 ? 'peek-right' : 'peek-left');
  }
}

/* ── dots ───────────────────────────────── */
function renderDots() {
  const q    = QUESTIONS[currentQ];
  const n    = q.cards.length;
  const dots = document.getElementById('dots');
  if (q.type === 'rank' || q.type === 'binary' || q.type === 'split') { dots.innerHTML = ''; return; }
  dots.innerHTML = Array.from({ length: n }, (_, i) =>
    `<div class="dot${i === centerIdx ? ' active' : ''}"></div>`
  ).join('');
}

/* ── bottom ─────────────────────────────── */
function renderBottom() {
  const q    = QUESTIONS[currentQ];
  const hint = document.getElementById('hint-text');
  const btn  = document.getElementById('next-btn');
  const lbl  = document.getElementById('next-label');

  if (q.type === 'rank') {
    btn.style.display = '';
    const done  = rankOrder.filter(r => r !== null).length;
    const total = q.cards.length;
    const full  = done === total;
    hint.textContent = full
      ? '✓ Semua sudah diurutkan!'
      : `Tap untuk pilih peringkat ${done + 1} dari ${total}`;
    hint.classList.toggle('selected', full);
    btn.classList.toggle('active', full);
    lbl.textContent = full
      ? (currentQ === QUESTIONS.length - 1 ? 'Lihat Hasilku' : 'Lanjut')
      : 'Urutkan semua dulu';

  } else if (q.type === 'swipe') {
    btn.style.display = '';
    btn.classList.add('active');
    hint.textContent  = '';
    hint.classList.remove('selected');
    lbl.textContent   = currentQ === QUESTIONS.length - 1 ? 'Lihat Hasilku' : 'Lanjut';

  } else {
    // binary / split — tap selects, Lanjut advances
    const picked = selectedIdx !== null;
    btn.style.display = '';
    btn.classList.toggle('active', picked);
    hint.textContent  = picked
      ? '✓ Pilihan tercatat!'
      : (q.type === 'split' ? 'Tap sisi yang paling kamu banget' : 'Tap kartu yang paling kamu banget');
    hint.classList.toggle('selected', picked);
    lbl.textContent = currentQ === QUESTIONS.length - 1 ? 'Lihat Hasilku' : 'Lanjut';
  }
}

/* ═══════════════════════════════════════
   DRAG — swipe deck only
═══════════════════════════════════════ */
document.addEventListener('mousedown', onStart);
document.addEventListener('touchstart', onStart, { passive: true });

function onStart(e) {
  const qtype = QUESTIONS[currentQ].type;
  if (qtype === 'rank' || qtype === 'binary' || qtype === 'split') return;
  const card = e.target.closest('.card');
  if (!card || card.dataset.pos !== 'center') return;
  dragging  = true;
  lastDelta = 0;
  startX    = e.touches ? e.touches[0].clientX : e.clientX;
  card.classList.add('dragging');
  window.addEventListener('mousemove', onMove);
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('mouseup',   onEnd);
  window.addEventListener('touchend',  onEnd);
}

function onMove(e) {
  if (!dragging) return;
  if (e.cancelable) e.preventDefault();
  const x = e.touches ? e.touches[0].clientX : e.clientX;
  lastDelta = x - startX;
  const center = document.querySelector('.card[data-pos="center"]');
  if (!center) return;
  const xBase = center.classList.contains('peek-left') ? 50 : center.classList.contains('peek-right') ? -50 : 0;
  center.style.transform = `translate3d(${xBase + lastDelta}px,0,0) rotate(${3 + lastDelta * 0.06}deg)`;
  center.classList.toggle('hint-right', lastDelta >  40);
  center.classList.toggle('hint-left',  lastDelta < -40);
}

function onEnd() {
  if (!dragging) return;
  dragging = false;
  window.removeEventListener('mousemove', onMove);
  window.removeEventListener('touchmove', onMove);
  window.removeEventListener('mouseup',   onEnd);
  window.removeEventListener('touchend',  onEnd);
  const center = document.querySelector('.card[data-pos="center"]');
  if (center) { center.classList.remove('dragging','hint-right','hint-left'); center.style.transform = ''; }

  const n = QUESTIONS[currentQ].cards.length;
  if      (lastDelta < -55 && centerIdx < n-1) centerIdx++;
  else if (lastDelta >  55 && centerIdx >   0) centerIdx--;

  updatePositions(); renderDots(); renderBottom();
}

/* ═══════════════════════════════════════
   STACK TRANSITION — auto-advance
═══════════════════════════════════════ */
function autoAdvance(answer) {
  answers.push({ question: currentQ, type: QUESTIONS[currentQ].type, answer });

  const stage    = document.getElementById('cards-stage');
  const qwrap    = document.querySelector('.question-wrap');
  const header   = document.querySelector('.header');
  const progWr   = document.querySelector('.progress-wrap');
  const bottom   = document.querySelector('.bottom');
  const qtype    = QUESTIONS[currentQ].type;
  const exitEase = 'cubic-bezier(0.4,0,0.6,1)';

  /* helper: fade out the current scene ornament after `delay` ms */
  function fadeOutScene(delay) {
    const sceneId = QUESTIONS[currentQ].scene;
    if (!sceneId) return;
    const sceneEl = document.getElementById(sceneId);
    if (!sceneEl) return;
    setTimeout(() => {
      sceneEl.style.transition = 'opacity 1.10s ease';
      sceneEl.classList.remove('active');
      setTimeout(() => { sceneEl.style.transition = ''; }, 1200);
    }, delay);
  }

  if (qtype === 'swipe') {
    /* ── Exit Layer 1 (0ms): selected card lifts, others stack ── */
    const cards  = Array.from(stage.querySelectorAll('.card'));
    const picked = cards.find(c => +c.dataset.idx === answer);
    const others = cards.filter(c => +c.dataset.idx !== answer);

    if (picked) {
      picked.style.transition = 'transform 0.52s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.52s ease';
      picked.style.transform  = 'translate3d(0,-12px,0) scale(1.07)';
      picked.style.boxShadow  = 'rgba(255,255,255,0.82) 0 0 46px 13px, rgba(0,0,0,0.20) 0 24px 48px';
      picked.style.zIndex     = '15';
    }
    others.forEach((c, n) => {
      c.style.transition = 'transform 0.48s cubic-bezier(0.4,0,0.6,1), opacity 0.48s ease';
      c.style.transform  = `translate3d(${(n + 1) * 5}px, 28px, 0) scale(0.86)`;
      c.style.opacity    = '0.45';
      c.style.zIndex     = '5';
    });

    /* ── Exit Layer 1b (440ms): cards stage flies up ── */
    setTimeout(() => {
      stage.style.transition = `transform 0.72s ${exitEase}, opacity 0.60s ease`;
      stage.style.transform  = 'translateY(-96px)';
      stage.style.opacity    = '0';
    }, 440);

    /* ── Exit Layer 2 (360ms): header + progress + question + lanjut ── */
    setTimeout(() => {
      header.style.transition = `opacity 0.46s ease, transform 0.52s ${exitEase}`;
      header.style.transform  = 'translateY(-8px)';
      header.style.opacity    = '0';
      progWr.style.transition = 'opacity 0.40s ease';
      progWr.style.opacity    = '0';
      qwrap.style.transition  = `transform 0.58s ${exitEase}, opacity 0.48s ease`;
      qwrap.style.transform   = 'translateY(-24px)';
      qwrap.style.opacity     = '0';
      bottom.style.transition = `opacity 0.40s ease, transform 0.46s ${exitEase}`;
      bottom.style.transform  = 'translateY(10px)';
      bottom.style.opacity    = '0';
    }, 360);

    /* ── Exit Layer 3 (900ms): Three.js ornament fades out ── */
    fadeOutScene(900);

    /* ── Exit Layer 4 (1100ms): doNext() → bg crossfades to new gradient ── */
    setTimeout(doNext, 1100);

  } else {
    /* ── Exit Layer 1 (0ms): cards / stage exits ── */
    stage.style.transition = `transform 0.58s ${exitEase}, opacity 0.50s ease`;
    stage.style.transform  = 'translateY(-48px)';
    stage.style.opacity    = '0';

    /* ── Exit Layer 2 (260ms): header + progress + question + lanjut ── */
    setTimeout(() => {
      header.style.transition = `opacity 0.44s ease, transform 0.50s ${exitEase}`;
      header.style.transform  = 'translateY(-8px)';
      header.style.opacity    = '0';
      progWr.style.transition = 'opacity 0.38s ease';
      progWr.style.opacity    = '0';
      qwrap.style.transition  = `transform 0.52s ${exitEase}, opacity 0.44s ease`;
      qwrap.style.transform   = 'translateY(-20px)';
      qwrap.style.opacity     = '0';
      bottom.style.transition = 'opacity 0.38s ease';
      bottom.style.opacity    = '0';
    }, 260);

    /* ── Exit Layer 3 (740ms): Three.js ornament fades out ── */
    fadeOutScene(740);

    /* ── Exit Layer 4 (940ms): doNext() → bg crossfades to new gradient ── */
    setTimeout(doNext, 940);
  }
}


/* ═══════════════════════════════════════
   GO BACK — exit current Q, restore prev
═══════════════════════════════════════ */
function goBack() {
  if (currentQ === 0 || answers.length === 0) return;

  const stage    = document.getElementById('cards-stage');
  const qwrap    = document.querySelector('.question-wrap');
  const header   = document.querySelector('.header');
  const progWr   = document.querySelector('.progress-wrap');
  const bottom   = document.querySelector('.bottom');
  const exitEase = 'cubic-bezier(0.4,0,0.6,1)';

  /* ornament fades (same helper, pass current Q's sceneId directly) */
  const sceneId = QUESTIONS[currentQ].scene;
  if (sceneId) {
    const sceneEl = document.getElementById(sceneId);
    if (sceneEl) {
      setTimeout(() => {
        sceneEl.style.transition = 'opacity 0.65s ease';
        sceneEl.classList.remove('active');
        setTimeout(() => { sceneEl.style.transition = ''; }, 700);
      }, 280);
    }
  }

  /* Exit Layer 1 (0ms): cards slide DOWN — reversed direction */
  stage.style.transition = `transform 0.44s ${exitEase}, opacity 0.36s ease`;
  stage.style.transform  = 'translateY(72px)';
  stage.style.opacity    = '0';

  /* Exit Layer 2 (140ms): chrome drifts down + fades */
  setTimeout(() => {
    header.style.transition = `opacity 0.28s ease, transform 0.32s ${exitEase}`;
    header.style.transform  = 'translateY(8px)';
    header.style.opacity    = '0';
    progWr.style.transition = 'opacity 0.24s ease';
    progWr.style.opacity    = '0';
    qwrap.style.transition  = `transform 0.36s ${exitEase}, opacity 0.30s ease`;
    qwrap.style.transform   = 'translateY(20px)';
    qwrap.style.opacity     = '0';
    bottom.style.transition = 'opacity 0.24s ease';
    bottom.style.opacity    = '0';
  }, 140);

  setTimeout(doBack, 560);
}

function doBack() {
  /* pop the answer that was given for the question we're returning to,
     so the user can freely re-answer it */
  const restoredAnswer = answers[answers.length - 1];
  answers.pop();
  currentQ--;

  /* restore selection state from the popped answer */
  const q = QUESTIONS[currentQ];
  if (q.type === 'swipe') {
    centerIdx   = typeof restoredAnswer.answer === 'number' ? restoredAnswer.answer : 0;
    selectedIdx = null;
    rankOrder   = [];
  } else if (q.type === 'rank') {
    rankOrder   = Array.isArray(restoredAnswer.answer) ? [...restoredAnswer.answer] : [];
    centerIdx   = 0;
    selectedIdx = null;
  } else {
    selectedIdx = typeof restoredAnswer.answer === 'number' ? restoredAnswer.answer : null;
    centerIdx   = 0;
    rankOrder   = [];
  }

  const stage  = document.getElementById('cards-stage');
  const qwrap  = document.querySelector('.question-wrap');
  const header = document.querySelector('.header');
  const progWr = document.querySelector('.progress-wrap');
  const bottom = document.querySelector('.bottom');

  /* snap residual styles */
  stage.style.transition = 'none'; stage.style.transform = ''; stage.style.opacity = '';
  qwrap.style.transition = 'none'; qwrap.style.transform = ''; qwrap.style.opacity = '';

  /* start all UI elements hidden */
  header.style.transition = 'none'; header.style.opacity = '0'; header.style.transform = 'translateY(10px)';
  progWr.style.transition = 'none'; progWr.style.opacity = '0';
  bottom.style.transition = 'none'; bottom.style.opacity = '0'; bottom.style.transform = 'translateY(-14px)';

  render(); /* rebuild content + updateScene (bg crossfades) */

  /* Layer 2: ornament fades in (same timing as doNext) */
  const sceneEl = document.getElementById(QUESTIONS[currentQ].scene);
  if (sceneEl) {
    sceneEl.classList.remove('active');
    sceneEl.style.transition = 'none';
    void sceneEl.offsetWidth;
    sceneEl.style.transition = 'opacity 1.80s ease';
    setTimeout(() => {
      sceneEl.classList.add('active');
      setTimeout(() => { sceneEl.style.transition = ''; }, 1900);
    }, 500);
  }

  /* Layer 3: chrome enters from ABOVE (translateY negative → 0) */
  qwrap.style.opacity   = '0';
  qwrap.style.transform = 'translateY(-30px)';
  void header.offsetWidth;

  setTimeout(() => {
    const ease = 'cubic-bezier(0.22,1,0.36,1)';
    header.style.transition = `opacity 0.60s ease, transform 0.75s ${ease}`;
    header.style.opacity    = ''; header.style.transform = '';
    progWr.style.transition = 'opacity 0.58s ease';
    progWr.style.opacity    = '';
    qwrap.style.transition  = `transform 0.75s ${ease}, opacity 0.60s ease`;
    qwrap.style.transform   = ''; qwrap.style.opacity = '';
    bottom.style.transition = `opacity 0.58s ease, transform 0.72s ${ease}`;
    bottom.style.opacity    = ''; bottom.style.transform = '';
    setTimeout(() => {
      header.style.transition = header.style.transform = header.style.opacity = '';
      progWr.style.transition = progWr.style.opacity = '';
      qwrap.style.transition  = qwrap.style.transform  = qwrap.style.opacity  = '';
      bottom.style.transition = bottom.style.transform = bottom.style.opacity = '';
    }, 950);
  }, 580);

  /* Layer 4: cards drop from ABOVE */
  if (q.type === 'swipe') {
    const cards = Array.from(stage.querySelectorAll('.card'));
    cards.forEach(c => {
      c.style.transition = 'none';
      c.style.transform  = 'translate3d(0, -68px, 0) scale(0.94)'; /* from above */
      c.style.opacity    = '0';
    });
    void stage.offsetWidth;
    cards.forEach((c, idx) => {
      setTimeout(() => {
        c.style.transition = 'transform 0.85s cubic-bezier(0.22,1,0.36,1), opacity 0.55s ease';
        c.style.transform  = '';
        c.style.opacity    = '';
        setTimeout(() => { c.style.transition = c.style.transform = c.style.opacity = ''; }, 950);
      }, 900 + idx * 120);
    });
  } else {
    stage.style.transition = 'none';
    stage.style.transform  = 'translateY(-48px)'; /* from above */
    stage.style.opacity    = '0';
    void stage.offsetWidth;
    setTimeout(() => {
      stage.style.transition = 'transform 0.85s cubic-bezier(0.22,1,0.36,1), opacity 0.60s ease';
      stage.style.transform  = ''; stage.style.opacity = '';
      setTimeout(() => { stage.style.transition = stage.style.transform = stage.style.opacity = ''; }, 950);
    }, 880);
  }
}


function doNext() {
  if (currentQ >= QUESTIONS.length - 1) {
    localStorage.setItem('conflictAnswers', JSON.stringify(answers));
    localStorage.setItem('selectedProfile', 'The Time Bomb');
    triggerStackingTransition();
    return;
  }

  currentQ++;
  centerIdx   = 0;
  selectedIdx = null;
  rankOrder   = [];

  const stage  = document.getElementById('cards-stage');
  const qwrap  = document.querySelector('.question-wrap');
  const header = document.querySelector('.header');
  const progWr = document.querySelector('.progress-wrap');
  const bottom = document.querySelector('.bottom');

  /* Snap stage & qwrap back instantly (no residual transitions) */
  stage.style.transition = 'none';
  stage.style.transform  = '';
  stage.style.opacity    = '';
  qwrap.style.transition = 'none';
  qwrap.style.transform  = '';
  qwrap.style.opacity    = '';

  /* Keep all UI elements hidden while we build the next state */
  header.style.transition = 'none';
  header.style.opacity    = '0';
  header.style.transform  = 'translateY(-10px)';
  progWr.style.transition = 'none';
  progWr.style.opacity    = '0';
  bottom.style.transition = 'none';
  bottom.style.opacity    = '0';
  bottom.style.transform  = 'translateY(14px)';

  render(); /* fills stage with new question's cards + updateScene() → bg + scene.active */

  const q = QUESTIONS[currentQ];

  /* ── Layer 2: ornament scene (500ms delay, 1.80s fade-in) ── */
  const sceneEl = document.getElementById(q.scene);
  if (sceneEl) {
    sceneEl.classList.remove('active');
    sceneEl.style.transition = 'none';
    void sceneEl.offsetWidth;
    sceneEl.style.transition = 'opacity 1.80s ease';
    setTimeout(() => {
      sceneEl.classList.add('active');
      setTimeout(() => { sceneEl.style.transition = ''; }, 1900);
    }, 500);
  }

  /* ── Layer 3: header + progWr + qwrap + bottom (580ms delay) ── */
  qwrap.style.opacity   = '0';
  qwrap.style.transform = 'translateY(30px)';
  void header.offsetWidth; /* reflow: commit hidden starting state */

  setTimeout(() => {
    const ease = 'cubic-bezier(0.22,1,0.36,1)';
    header.style.transition = `opacity 0.60s ease, transform 0.75s ${ease}`;
    header.style.opacity    = '';
    header.style.transform  = '';
    progWr.style.transition = 'opacity 0.58s ease';
    progWr.style.opacity    = '';
    qwrap.style.transition  = `transform 0.75s ${ease}, opacity 0.60s ease`;
    qwrap.style.transform   = '';
    qwrap.style.opacity     = '';
    bottom.style.transition = `opacity 0.58s ease, transform 0.72s ${ease}`;
    bottom.style.opacity    = '';
    bottom.style.transform  = '';
    setTimeout(() => {
      header.style.transition = header.style.transform = header.style.opacity = '';
      progWr.style.transition = progWr.style.opacity = '';
      qwrap.style.transition  = qwrap.style.transform  = qwrap.style.opacity  = '';
      bottom.style.transition = bottom.style.transform = bottom.style.opacity = '';
    }, 950);
  }, 580);

  /* ── Layer 4: cards (900ms+, 120ms stagger between each) ── */
  if (q.type === 'swipe') {
    const cards = Array.from(stage.querySelectorAll('.card'));
    cards.forEach(c => {
      c.style.transition = 'none';
      c.style.transform  = 'translate3d(0, 68px, 0) scale(0.94)';
      c.style.opacity    = '0';
    });
    void stage.offsetWidth;
    cards.forEach((c, idx) => {
      setTimeout(() => {
        c.style.transition = 'transform 0.85s cubic-bezier(0.22,1,0.36,1), opacity 0.55s ease';
        c.style.transform  = '';
        c.style.opacity    = '';
        setTimeout(() => { c.style.transition = c.style.transform = c.style.opacity = ''; }, 950);
      }, 900 + idx * 120);
    });

  } else {
    /* Stage-level enter for rank / binary / split */
    stage.style.transition = 'none';
    stage.style.transform  = 'translateY(48px)';
    stage.style.opacity    = '0';
    void stage.offsetWidth;
    setTimeout(() => {
      stage.style.transition = 'transform 0.85s cubic-bezier(0.22,1,0.36,1), opacity 0.60s ease';
      stage.style.transform  = '';
      stage.style.opacity    = '';
      setTimeout(() => { stage.style.transition = stage.style.transform = stage.style.opacity = ''; }, 950);
    }, 880);
  }
}

/* ═══════════════════════════════════════
   TAP handlers
═══════════════════════════════════════ */
document.addEventListener('click', e => {
  if (Math.abs(lastDelta) > 12) { lastDelta = 0; return; }

  /* ── split tap — select only, Lanjut advances ── */
  if (QUESTIONS[currentQ].type === 'split') {
    const half = e.target.closest('.split-half');
    if (!half) return;
    const i     = +half.dataset.idx;
    const stage = document.getElementById('cards-stage');
    selectedIdx = i;
    stage.classList.remove('sel-a', 'sel-b');
    stage.classList.add(i === 0 ? 'sel-a' : 'sel-b');
    renderBottom();
    return;
  }

  /* ── rank tap ── */
  if (QUESTIONS[currentQ].type === 'rank') {
    const row = e.target.closest('.rank-row');
    if (!row) return;
    const i = +row.dataset.idx;
    const existing = rankOrder[i];
    if (existing !== null) {
      rankOrder[i] = null;
      for (let j = 0; j < rankOrder.length; j++) {
        if (rankOrder[j] !== null && rankOrder[j] > existing) rankOrder[j]--;
      }
    } else {
      rankOrder[i] = rankOrder.filter(r => r !== null).length + 1;
    }
    updateRankDisplay();
    renderBottom();
    return;
  }

  const card = e.target.closest('.card');
  if (!card) return;

  const i = +card.dataset.idx;

  /* ── binary tap — select only, Lanjut advances ── */
  if (QUESTIONS[currentQ].type === 'binary') {
    selectedIdx = i;
    document.querySelectorAll('.binary-mode .card').forEach((c, ci) => {
      c.classList.remove('b-selected', 'b-unselected');
      c.classList.add(ci === i ? 'b-selected' : 'b-unselected');
    });
    renderBottom();
    return;
  }

  /* ── swipe tap — change center card; Lanjut advances ── */
  const pos = card.dataset.pos;
  if (pos === 'left' || pos === 'right') {
    centerIdx = i; updatePositions(); renderDots(); renderBottom();
  }
  // center tap no longer advances — use Lanjut button
  lastDelta = 0;
});

/* ═══════════════════════════════════════
   NEXT button — swipe uses centerIdx,
   rank requires full ordering
═══════════════════════════════════════ */
document.getElementById('next-btn').addEventListener('click', () => {
  const q = QUESTIONS[currentQ];
  if (q.type === 'swipe') {
    autoAdvance(centerIdx);
  } else if (q.type === 'rank') {
    if (rankOrder.filter(r => r !== null).length !== q.cards.length) return;
    autoAdvance([...rankOrder]);
  } else if (q.type === 'binary' || q.type === 'split') {
    if (selectedIdx === null) return;
    autoAdvance(selectedIdx);
  }
});

/* ── scene switcher ─────────────────────── */
function updateScene(q) {
  document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
  const sceneId = QUESTIONS[q].scene;
  if (sceneId) {
    const el = document.getElementById(sceneId);
    if (el) el.classList.add('active');
  }
  /* background stays consistent — warm romantic CSS animation */
}


/* ═══════════════════════════════════════
   THREE.JS ORNAMENT — Q4 (sc3)
   Two opposing crystal shards orbiting
   each other — "perbedaan keinginan"
   Pink = avoid conflict  🕊️
   Orange = speak up      🗣️
═══════════════════════════════════════ */
(function initAllScenes() {
  if (typeof THREE === 'undefined') return;

  /* ── device detection ── */
  const isMob  = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || window.devicePixelRatio > 1.5;
  const maxDPR = isMob ? 1.5 : 2;

  /* ── geometry complexity helpers (lower counts on mobile) ── */
  const S = (hi, lo) => isMob ? lo : hi;   /* segment selector */
  const NP = (hi, lo) => isMob ? lo : hi;  /* particle count   */

  /* ── pause flag: stop rendering when tab is hidden ── */
  let paused = document.hidden;
  document.addEventListener('visibilitychange', () => { paused = document.hidden; });

  /* ── lazy registry: scenes created only when first activated ── */
  const registry = [];   /* { el, renderer, scene, cam, tick } — initialised */
  const pending  = [];   /* { el, setupFn }                   — awaiting first activation */
  let loopStarted = false, skipFrame = false;

  function _initScene({ el, setupFn }) {
    const canvas = document.createElement('canvas');
    canvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;';
    el.appendChild(canvas);
    const renderer = new THREE.WebGLRenderer({
      canvas, alpha: true,
      antialias: !isMob,
      powerPreference: isMob ? 'default' : 'high-performance'
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, maxDPR));
    renderer.setClearColor(0x000000, 0);
    const scene = new THREE.Scene();
    const cam   = new THREE.PerspectiveCamera(52, 1, 0.1, 100);
    cam.position.z = 5.0;
    const tick = setupFn(scene, cam);
    function resize() {
      const w = el.clientWidth  || 390;
      const h = el.clientHeight || 760;
      renderer.setSize(w, h, false);
      cam.aspect = w / h;
      cam.updateProjectionMatrix();
    }
    resize();
    new ResizeObserver(resize).observe(el);
    registry.push({ el, renderer, scene, cam, tick });
  }

  function startLoop() {
    if (loopStarted) return;
    loopStarted = true;
    (function loop() {
      requestAnimationFrame(loop);
      if (paused) return;
      /* throttle to ~30 fps on mobile */
      if (isMob) { skipFrame = !skipFrame; if (skipFrame) return; }
      /* lazy-init any pending scene that just became active */
      for (let i = pending.length - 1; i >= 0; i--) {
        if (pending[i].el.classList.contains('active')) {
          _initScene(pending.splice(i, 1)[0]);
        }
      }
      /* render active scenes */
      for (const s of registry) {
        if (!s.el.classList.contains('active')) continue;
        s.tick();
        s.renderer.render(s.scene, s.cam);
      }
    })();
  }

  /* ── shared factory: defers WebGL context creation until scene is first shown ── */
  function mkScene(id, setupFn) {
    const el = document.getElementById(id);
    if (!el) return;
    pending.push({ el, setupFn });
    startLoop();
  }

  /* ── wireframe+fill helper ── */
  function mkWire(geo, col, fillOp, wireOp) {
    const g = new THREE.Group();
    g.add(new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: fillOp, side: THREE.DoubleSide })));
    g.add(new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: wireOp, wireframe: true })));
    return g;
  }

  /* ══════════════════════════════════
     sc0 / Q1 — CONFLICT KNOT: 3D torus knot + two counter-orbiting rings
  ══════════════════════════════════ */
  mkScene('sc0', (scene, cam) => {
    cam.position.z = 5.8;

    const COL_KNOT = 0xC89AB0;  /* soft mauve — the knot of conflict         */
    const COL_RING = 0xC8405A;  /* rose       — the two parties entwined     */

    /* ── Central torus knot (p=2,q=3 trefoil) ── */
    const knotGeo = new THREE.TorusKnotGeometry(0.80, 0.092, S(88,52), 8, 2, 3);
    const knot = new THREE.Group();
    knot.add(new THREE.Mesh(knotGeo, new THREE.MeshBasicMaterial({
      color: COL_KNOT, transparent: true, opacity: 0.08, side: THREE.DoubleSide
    })));
    knot.add(new THREE.Mesh(knotGeo, new THREE.MeshBasicMaterial({
      color: COL_KNOT, transparent: true, opacity: 0.44, wireframe: true
    })));
    scene.add(knot);

    /* ── Two orbiting rings — caught inside the knot ── */
    function mkRing(col, tubeR) {
      const geo = new THREE.TorusGeometry(0.50, tubeR, 6, S(44,28));
      const g = new THREE.Group();
      g.add(new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
        color: col, transparent: true, opacity: 0.09, side: THREE.DoubleSide
      })));
      g.add(new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
        color: col, transparent: true, opacity: 0.46, wireframe: true
      })));
      return g;
    }

    const ringA = mkRing(COL_RING, 0.038);
    const ringB = mkRing(COL_RING, 0.030);
    /* tilt them differently for interlocked feel */
    ringA.rotation.x = Math.PI * 0.30;
    ringA.rotation.z = Math.PI * 0.10;
    ringB.rotation.x = Math.PI * 0.70;
    ringB.rotation.z = -Math.PI * 0.12;
    scene.add(ringA, ringB);

    /* ── Soft ambient particles ── */
    const N = NP(24, 14);
    const pA  = Array.from({ length: N }, (_, i) => (i / N) * Math.PI * 2);
    const pR  = pA.map(() => 1.68 + Math.random() * 0.65);
    const pSp = pA.map(() => 0.0016 + Math.random() * 0.0014);
    const pZ  = pA.map(() => (Math.random() - 0.5) * 1.1);
    const pPos = new Float32Array(N * 3);
    const pGeo = new THREE.BufferGeometry();
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    scene.add(new THREE.Points(pGeo, new THREE.PointsMaterial({
      color: COL_KNOT, size: 0.042, transparent: true, opacity: 0.30
    })));

    let t = 0;
    return () => {
      t += 0.007;

      /* knot tumbles gently — reveals its 3D form continuously */
      knot.rotation.y += 0.0038;
      knot.rotation.x  = Math.sin(t * 0.32) * 0.18;
      knot.rotation.z  = Math.sin(t * 0.25) * 0.10;

      /* rings counter-rotate — the two parties struggling against each other */
      ringA.rotation.y += 0.0055;
      ringA.rotation.z  = Math.PI * 0.10 + Math.sin(t * 0.42) * 0.08;
      ringB.rotation.y -= 0.0048;
      ringB.rotation.z  = -Math.PI * 0.12 + Math.sin(t * 0.38 + 1.4) * 0.08;

      /* gentle opposing float */
      ringA.position.y =  Math.sin(t * 0.50) * 0.14;
      ringB.position.y = -Math.sin(t * 0.50) * 0.14;

      /* very subtle pulse */
      const s = 1 + Math.sin(t * 1.05) * 0.018;
      knot.scale.setScalar(s);

      /* drift particles in ellipse */
      for (let i = 0; i < N; i++) {
        pA[i] += pSp[i];
        pPos[i*3]   = Math.cos(pA[i]) * pR[i];
        pPos[i*3+1] = Math.sin(pA[i]) * pR[i] * 0.54;

  /* ══════════════════════════════════

  ══════════════════════════════════ */
  mkScene('sc1', (scene, cam) => {
    cam.position.z = 5.5;

    const COL_CORE = 0xC8405A;  /* rose — the heat source   */
    const COL_RING = 0x8C5070;  /* mauve — expanding waves  */

    /* ── Layered glowing orb ── */
    const core = new THREE.Group();
    scene.add(core);

    /* solid fill */
    core.add(new THREE.Mesh(
      new THREE.IcosahedronGeometry(0.30, S(2,1)),

    ));
    /* wireframe shell — shows 3D structure */
    core.add(new THREE.Mesh(

    const NR = 4;
    const ringMats = [];

    for (let i = 0; i < NR; i++) {

      const mesh = new THREE.Mesh(new THREE.TorusGeometry(1, 0.020, 6, S(52,36)), mat);
      mesh.rotation.x = Math.PI / 2 - 0.22;  /* tilt reveals elliptical 3-D shape */

    /* ── Gentle rising heat particles (sparse, slow) ── */
    const NP1 = NP(20, 10), pPos = new Float32Array(NP1 * 3), pVel = [];
    for (let i = 0; i < NP1; i++) {
      pPos[i*3]   = (Math.random() - 0.5) * 3.2;
      pPos[i*3+1] = -3.5 - Math.random() * 2.5;
      pPos[i*3+2] = (Math.random() - 0.5) * 1.0;

    }
    const pGeo = new THREE.BufferGeometry();

    scene.add(new THREE.Points(pGeo, new THREE.PointsMaterial({
      color: 0xC4923A, size: 0.048, transparent: true, opacity: 0.38
    })));

    let t = 0;
    return () => {

      /* core breathes — expand on inhale, contract on exhale */

      core.position.y  = Math.sin(t * 0.52) * 0.10;

      for (let i = 0; i < NR; i++) {
        const raw  = ((t * 0.16 + i / NR) % 1.0);
        /* smoothstep — rings accelerate slightly as they expand */
        const prog = raw * raw * (3 - 2 * raw);

        /* scale: near-zero at birth, wide at death */
        const sc = 0.18 + prog * 2.55;
        ringMeshes[i].scale.set(sc, sc, 1);

        /* drift upward slightly — heat rises */
        ringMeshes[i].position.y = -0.10 + prog * 0.55;

        ringMats[i].opacity = (1 - prog) * 0.52;

      /* update sparse rising particles */
      for (let i = 0; i < NP1; i++) {
        pPos[i*3]   += pVel[i].x + Math.sin(t * 0.9 + i) * 0.002;

  /* ══════════════════════════════════
     sc3 / Q4 — COLLIDING ORBS: two glowing spheres approaching, tension, retreating
  ══════════════════════════════════ */
  mkScene('sc3', (scene, cam) => {
    cam.position.z = 5.8;

    const COL_A = 0xC8405A;  /* rose        */
    const COL_B = 0xF2A0B0;  /* rose-light  */

    /* ── build a layered glow orb ── */
    function mkOrb(col) {
      const g = new THREE.Group();
      /* core — bright, solid-ish */
      g.add(new THREE.Mesh(
        new THREE.IcosahedronGeometry(0.27, 2),
        new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.78 })
      ));
      /* wireframe shell on core */
      g.add(new THREE.Mesh(
        new THREE.IcosahedronGeometry(0.27, 1),
        new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.30, wireframe: true })
      ));
      /* inner halo */

        new THREE.IcosahedronGeometry(0.46, 1),
        new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.16, side: THREE.BackSide })
      ));
      /* outer halo */
      g.add(new THREE.Mesh(
        new THREE.IcosahedronGeometry(0.70, 1),
        new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.06, side: THREE.BackSide })
      ));
      return g;
    }

    const orbA = mkOrb(COL_A);
    const orbB = mkOrb(COL_B);
    scene.add(orbA);
    scene.add(orbB);

    /* ── connection line that materialises when orbs are close ── */
    const lineBuf = new Float32Array(6); /* 2 × xyz */
    const lineGeo = new THREE.BufferGeometry();
    lineGeo.setAttribute('position', new THREE.BufferAttribute(lineBuf, 3));
    const lineMat = new THREE.LineBasicMaterial({ color: 0xC8405A, transparent: true, opacity: 0 });
    scene.add(new THREE.Line(lineGeo, lineMat));

    /* ── orbital particles around each orb ── */
    const NP3 = NP(18, 10);
    function mkOrbParticles(col) {
      const pos    = new Float32Array(NP3 * 3);
      const angles = Array.from({ length: NP3 }, (_, i) => (i / NP3) * Math.PI * 2);
      const radii  = angles.map(() => 0.52 + Math.random() * 0.28);
      const geo    = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
        color: col, size: 0.040, transparent: true, opacity: 0.38
      })));
      return { pos, geo, angles, radii };
    }
    const partA = mkOrbParticles(COL_A);
    const partB = mkOrbParticles(COL_B);

    const MAX_DIST = 2.20;
    const MIN_DIST = 0.44;

    let t = 0;
    return () => {
      t += 0.008;

      /* smooth approach/retreat on a sine wave — eased so it lingers at close range */
      const raw   = (Math.sin(t * 0.55) + 1) * 0.5;          /* 0 → 1 → 0        */
      const eased = raw * raw * (3 - 2 * raw);                /* smoothstep        */
      const dist  = MIN_DIST + (MAX_DIST - MIN_DIST) * (1 - eased);

      /* slight perpendicular drift for 3-D feel */
      const driftY = Math.sin(t * 0.28) * 0.18;
      const driftZ = Math.cos(t * 0.22) * 0.20;
      orbA.position.set(-dist,  driftY,  driftZ);
      orbB.position.set( dist, -driftY, -driftZ);

      /* orbs grow subtly as they approach — urgency */
      const sc = 1.0 + eased * 0.18;
      orbA.scale.setScalar(sc);
      orbB.scale.setScalar(sc);

      /* self-rotation */
      orbA.rotation.y += 0.009;
      orbA.rotation.x  = Math.sin(t * 0.35) * 0.12;
      orbB.rotation.y -= 0.008;
      orbB.rotation.x  = Math.sin(t * 0.35 + 1.2) * 0.12;

      /* connection line fades in near collision */
      const proximity = Math.max(0, 1 - dist / 1.1);
      lineMat.opacity = proximity * 0.28;
      lineBuf[0] = orbA.position.x; lineBuf[1] = orbA.position.y; lineBuf[2] = orbA.position.z;
      lineBuf[3] = orbB.position.x; lineBuf[4] = orbB.position.y; lineBuf[5] = orbB.position.z;
      lineGeo.attributes.position.needsUpdate = true;

      /* orbit particles follow their orb */
      for (let i = 0; i < NP3; i++) {
        partA.angles[i] += 0.024;
        partA.pos[i*3]   = orbA.position.x + Math.cos(partA.angles[i]) * partA.radii[i];
        partA.pos[i*3+1] = orbA.position.y + Math.sin(partA.angles[i]) * partA.radii[i] * 0.58;
        partA.pos[i*3+2] = orbA.position.z + Math.sin(partA.angles[i] * 0.7) * 0.18;

        partB.angles[i] -= 0.021;
        partB.pos[i*3]   = orbB.position.x + Math.cos(partB.angles[i]) * partB.radii[i];
        partB.pos[i*3+1] = orbB.position.y + Math.sin(partB.angles[i]) * partB.radii[i] * 0.58;
        partB.pos[i*3+2] = orbB.position.z + Math.sin(partB.angles[i] * 0.7) * 0.18;
      }
      partA.geo.attributes.position.needsUpdate = true;
      partB.geo.attributes.position.needsUpdate = true;
    };
  });

  /* ══════════════════════════════════
     sc4 / sc5 / sc6 / sc-binary — 3D CROSSROADS
     Low-angle perspective fork road with person silhouette
  ══════════════════════════════════ */
  function mkCrossroads(id, C) {
    mkScene(id, (scene, cam) => {
      /* low-angle camera looking down the road toward the fork */
      cam.fov = 62;
      cam.position.set(0, 2.6, 5.5);
      cam.lookAt(0, -0.6, -1.0);
      cam.updateProjectionMatrix();

      /* ── generate road surface mesh from a curve ── */
      function roadMesh(curve, hw, segs, mat) {
        const pts = curve.getPoints(segs);
        const verts = [], idx = [];
        pts.forEach((pt, i) => {
          const next = pts[Math.min(i+1, pts.length-1)];
          const prev = pts[Math.max(i-1, 0)];
          const tangent = next.clone().sub(prev).normalize();
          const perp = new THREE.Vector3(tangent.z, 0, -tangent.x);
          verts.push(
            pt.x - perp.x*hw, pt.y, pt.z - perp.z*hw,
            pt.x + perp.x*hw, pt.y, pt.z + perp.z*hw
          );
          if (i > 0) {
            const b = (i-1)*2;
            idx.push(b, b+2, b+1,  b+1, b+2, b+3);
          }
        });
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
        geo.setIndex(idx);
        return new THREE.Mesh(geo, mat);
      }

      /* ── edge glow line at ±hw offset from curve ── */
      function edgeLine(curve, hw, side, col, op) {
        const pts = curve.getPoints(36).map((pt, i, arr) => {
          const next = arr[Math.min(i+1, arr.length-1)];
          const prev = arr[Math.max(i-1, 0)];
          const tangent = next.clone().sub(prev).normalize();
          const perp = new THREE.Vector3(tangent.z, 0, -tangent.x);
          return new THREE.Vector3(pt.x + perp.x*hw*side, 0.018, pt.z + perp.z*hw*side);
        });
        return new THREE.Line(
          new THREE.BufferGeometry().setFromPoints(pts),
          new THREE.LineBasicMaterial({ color: col, transparent: true, opacity: op })
        );
      }

      /* ── dashed centre line using LineSegments ── */
      function dashLine(curve, col) {
        const dashLen = 0.34, gapLen = 0.24, total = curve.getLength();
        const pairs = [];
        let dist = 0, on = true;
        while (dist < total) {
          const segLen = on ? dashLen : gapLen;
          if (on && dist + segLen <= total) {
            pairs.push(
              curve.getPointAt( dist / total ),
              curve.getPointAt( Math.min((dist + segLen) / total, 1) )
            );
          }
          dist += segLen; on = !on;
        }
        const pts3 = pairs.map(p => new THREE.Vector3(p.x, 0.025, p.z));
        return new THREE.LineSegments(
          new THREE.BufferGeometry().setFromPoints(pts3),
          new THREE.LineBasicMaterial({ color: col, transparent: true, opacity: 0.75 })
        );
      }

      /* ── three road curves ── */
      const stemCurve = new THREE.CatmullRomCurve3([
        new THREE.Vector3(0, 0, 5.5),
        new THREE.Vector3(0, 0, 2.5),
        new THREE.Vector3(0, 0, 0),
      ]);
      const leftCurve = new THREE.QuadraticBezierCurve3(
        new THREE.Vector3(0,  0,  0),
        new THREE.Vector3(-1.4, 0, -2.5),
        new THREE.Vector3(-5.2, 0, -5.5)
      );
      const rightCurve = new THREE.QuadraticBezierCurve3(
        new THREE.Vector3(0,  0,  0),
        new THREE.Vector3( 1.4, 0, -2.5),
        new THREE.Vector3( 5.2, 0, -5.5)
      );

      /* ── pre-sample curves into LUT — avoids getPointAt() per particle per frame ── */
      const LUT_N = 80;
      function buildLUT(curve) {
        const lut = new Float32Array(LUT_N * 4); /* x, z, perpX, perpZ */
        for (let i = 0; i < LUT_N; i++) {
          const t0 = i / LUT_N;
          const t1 = Math.min((i + 1) / LUT_N, 1);
          const p0 = curve.getPointAt(t0);
          const p1 = curve.getPointAt(t1);
          const dx = p1.x - p0.x, dz = p1.z - p0.z;
          const len = Math.hypot(dx, dz) || 1;
          lut[i*4]   = p0.x;
          lut[i*4+1] = p0.z;
          lut[i*4+2] =  dz / len;   /* perpX */
          lut[i*4+3] = -dx / len;   /* perpZ */
        }
        return lut;
      }
      const LUTS = [buildLUT(stemCurve), buildLUT(leftCurve), buildLUT(rightCurve)];

      /* ── road surfaces ── */
      const RD = S(20, 12);
      const roadMat = new THREE.MeshBasicMaterial({ color: C.road, transparent: true, opacity: 0.90, side: THREE.DoubleSide });
      scene.add(roadMesh(stemCurve,  0.85, RD, roadMat));
      scene.add(roadMesh(leftCurve,  0.72, RD, roadMat));
      scene.add(roadMesh(rightCurve, 0.72, RD, roadMat));

      /* ── outer edge lines ── */
      scene.add(edgeLine(stemCurve,  0.85, -1, C.stem,  0.50));
      scene.add(edgeLine(stemCurve,  0.85,  1, C.stem,  0.50));
      scene.add(edgeLine(leftCurve,  0.72, -1, C.left,  0.72));
      scene.add(edgeLine(leftCurve,  0.72,  1, C.left,  0.72));
      scene.add(edgeLine(rightCurve, 0.72, -1, C.right, 0.72));
      scene.add(edgeLine(rightCurve, 0.72,  1, C.right, 0.72));
      /* inner double-line near edge for realism */
      scene.add(edgeLine(leftCurve,  0.60, -1, C.left,  0.28));
      scene.add(edgeLine(rightCurve, 0.60,  1, C.right, 0.28));

      /* ── centre dashed lines ── */
      scene.add(dashLine(stemCurve,  C.dashStem));
      scene.add(dashLine(leftCurve,  C.dashLeft));
      scene.add(dashLine(rightCurve, C.dashRight));


      /* ── flowing particles along roads (LUT-based — no getPointAt per frame) ── */
      const N = NP(60, 32);
      const pPos = new Float32Array(N * 3);
      const pData = Array.from({ length: N }, () => ({
        t:    Math.random(),
        side: Math.floor(Math.random() * 3),   /* 0=stem,1=left,2=right */
        off:  (Math.random() - 0.5) * 0.55     /* lateral offset */
      }));
      const pGeo = new THREE.BufferGeometry();
      pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
      scene.add(new THREE.Points(pGeo,
        new THREE.PointsMaterial({ color: C.particle, size: 0.052, transparent: true, opacity: 0.55 })
      ));
      const SPEEDS = [0.0042, 0.0034, 0.0034];

      let elapsed = 0;
      return () => {
        elapsed += 0.012;

        /* subtle camera sway */
        cam.position.x = Math.sin(elapsed * 0.14) * 0.07;
        cam.lookAt(0, -0.6, -1.0);

        /* particle flow — LUT lookup, O(N) array reads instead of curve evaluations */
        for (let i = 0; i < N; i++) {
          const p = pData[i];
          p.t += SPEEDS[p.side];
          if (p.t >= 1) {
            p.t   -= 1;
            p.side = Math.floor(Math.random() * 3);
            p.off  = (Math.random() - 0.5) * 0.55;
          }
          const lut = LUTS[p.side];
          const idx = (Math.floor(p.t * LUT_N) % LUT_N) * 4;
          pPos[i*3]   = lut[idx]   + lut[idx+2] * p.off;
          pPos[i*3+1] = 0.03;
          pPos[i*3+2] = lut[idx+1] + lut[idx+3] * p.off;
        }
        pGeo.attributes.position.needsUpdate = true;
      };
    });
  }
  // Q5 — tender, soft: conversation going off-track (hurt avoidance vs compromise)
  mkCrossroads('sc4',      { road: 0xE8D8D0, stem: 0x8C6870, left: 0xF2A0B0, right: 0xD4A8A0, dashStem: 0xF7D6DC, dashLeft: 0xF2A0B0, dashRight: 0xD4A8A0, particle: 0xF7D6DC });
  // Q6 — warm, open: not aligned with partner (fulfill partner vs open up)

  // Q7 — assertive, contrast: opinions differ (yield vs persuade)

  /* ══════════════════════════════════
     sc-19 / Q11 — PETAL RAIN: gentle rose petals drifting down
