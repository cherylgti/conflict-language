      const sc = 0.48 + Math.random() * 0.60;
      mesh.scale.setScalar(sc);
      const ix = (Math.random() - 0.5) * 6.5;
      const iy = -2.8 + Math.random() * 7.0;   /* spread across full height */
      mesh.position.set(ix, iy, (Math.random() - 0.5) * 1.8);
      mesh.rotation.set(
        Math.random() * Math.PI,
        Math.random() * Math.PI,
        Math.random() * Math.PI * 2
      );
      scene.add(mesh);
      return {
        mesh,
        ix,                                          /* base x for sway */
        speed:     0.006 + Math.random() * 0.007,   /* fall speed */
        swayAmp:   0.12  + Math.random() * 0.18,    /* horizontal sway width */
        swayFreq:  0.35  + Math.random() * 0.45,    /* sway frequency */
        swayOff:   Math.random() * Math.PI * 2,     /* phase offset */
        spinZ:     (Math.random() - 0.5) * 0.014,   /* slow flutter */
        spinX:     (Math.random() - 0.5) * 0.008,
      };
    });

    let t = 0;
    return () => {
      t += 0.012;
      petals.forEach(p => {
        /* drift downward */
        p.mesh.position.y -= p.speed;
        /* gentle side sway */
        p.mesh.position.x  = p.ix + Math.sin(t * p.swayFreq + p.swayOff) * p.swayAmp;
        /* slow flutter rotation */
        p.mesh.rotation.z += p.spinZ;
        p.mesh.rotation.x += p.spinX;
        /* recycle petal back to top when it exits below */
        if (p.mesh.position.y < -3.2) {
          p.mesh.position.y = 3.8 + Math.random() * 1.5;
          p.ix = (Math.random() - 0.5) * 6.5;
          p.mesh.position.x = p.ix;
        }
      });
    };
  });

  /* ══════════════════════════════════
     sc-q9 / Q9 — AWKWARD: wobbly TorusKnot
  ══════════════════════════════════ */
  mkScene('sc-q9', (scene, cam) => {
    cam.position.z = 5.5;
    const knot = mkWire(new THREE.TorusKnotGeometry(0.88, 0.24, S(60,38), 8), 0xC8405A, 0.09, 0.52);
    scene.add(knot);
    const N = NP(35, 18), kPos = new Float32Array(N*3), kVel = [];
    for (let i = 0; i < N; i++) {
      kPos[i*3]   = (Math.random()-0.5)*6.5; kPos[i*3+1] = (Math.random()-0.5)*5.5; kPos[i*3+2] = (Math.random()-0.5)*2;
      kVel.push({ x:(Math.random()-0.5)*0.007, y:(Math.random()-0.5)*0.007 });
    }
    const kGeo = new THREE.BufferGeometry(); kGeo.setAttribute('position', new THREE.BufferAttribute(kPos, 3));
    scene.add(new THREE.Points(kGeo, new THREE.PointsMaterial({ color: 0xF2A0B0, size: 0.062, transparent: true, opacity: 0.50 })));
    let t = 0;
    return () => {
      t += 0.014;
      knot.rotation.x = Math.sin(t*0.82)*0.55 + t*0.30;
      knot.rotation.y = Math.cos(t*0.62)*0.44 + t*0.22;
      knot.rotation.z = Math.sin(t*1.24)*0.30;
      const w = 1 + Math.sin(t*2.6)*0.065;
      knot.scale.set(w, w + Math.sin(t*3.1)*0.04, w);
      for (let i = 0; i < N; i++) {
        kPos[i*3] += kVel[i].x; kPos[i*3+1] += kVel[i].y;
        if (Math.abs(kPos[i*3])   > 3.4) kVel[i].x *= -1;
        if (Math.abs(kPos[i*3+1]) > 2.9) kVel[i].y *= -1;
      }
      kGeo.attributes.position.needsUpdate = true;
    };
  });

  /* ══════════════════════════════════
     sc-q10 / Q10 — DUAL ORBIT: torus + icosahedron orbiting, near-missing, proximity glow
  ══════════════════════════════════ */
  mkScene('sc-q10', (scene, cam) => {
    cam.position.z = 5.8;

    const COL_A = 0xC8405A;  /* rose — editorial palette  */
    const COL_B = 0xC89AB0;  /* mauve — editorial palette */

    /* ── Object A: Tilted torus ── */
    const torusGrp = new THREE.Group();
    scene.add(torusGrp);
    torusGrp.add(new THREE.Mesh(
      new THREE.TorusGeometry(0.62, 0.175, 6, S(42,28)),
      new THREE.MeshBasicMaterial({ color: COL_A, transparent: true, opacity: 0.09, side: THREE.DoubleSide })
    ));
    torusGrp.add(new THREE.Mesh(
      new THREE.TorusGeometry(0.62, 0.175, 6, S(42,28)),
      new THREE.MeshBasicMaterial({ color: COL_A, transparent: true, opacity: 0.48, wireframe: true })
    ));
    torusGrp.rotation.x = Math.PI / 3;  /* initial tilt shows 3-D shape immediately */

    /* ── Object B: Icosahedron ── */
    const icoGrp = new THREE.Group();
    scene.add(icoGrp);
    const icoFill = new THREE.Mesh(
      new THREE.IcosahedronGeometry(0.36, 1),
      new THREE.MeshBasicMaterial({ color: COL_B, transparent: true, opacity: 0.10, side: THREE.DoubleSide })
    );
    const icoWire = new THREE.Mesh(
      new THREE.IcosahedronGeometry(0.36, 1),
      new THREE.MeshBasicMaterial({ color: COL_B, transparent: true, opacity: 0.50, wireframe: true })
    );
    icoGrp.add(icoFill, icoWire);

    /* ── Proximity connection line (fades in on near-miss) ── */
    const lBuf = new Float32Array(6);
    const lGeo = new THREE.BufferGeometry();
    lGeo.setAttribute('position', new THREE.BufferAttribute(lBuf, 3));
    const lMat = new THREE.LineBasicMaterial({ color: 0xF2A0B0, transparent: true, opacity: 0 });
    scene.add(new THREE.Line(lGeo, lMat));

    /* ── Ambient particles drifting in the background ── */
    const NPQ10 = NP(28, 16);
    const pA  = Array.from({ length: NPQ10 }, (_, i) => (i / NPQ10) * Math.PI * 2);
    const pR  = pA.map(() => 1.75 + Math.random() * 0.72);
    const pSp = pA.map(() => 0.0018 + Math.random() * 0.0016);
    const pZ  = pA.map(() => (Math.random() - 0.5) * 1.4);
    const pPos = new Float32Array(NPQ10 * 3);
    const pGeo = new THREE.BufferGeometry();
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    scene.add(new THREE.Points(pGeo, new THREE.PointsMaterial({
      color: COL_A, size: 0.040, transparent: true, opacity: 0.28
    })));

    const OR = 1.12;  /* orbital radius */
    let angA = 0, angB = Math.PI, t = 0;

    return () => {
      t += 0.007;

      /* opposing orbital directions on different planes for 3-D near-miss */
      angA += 0.0080;
      angB -= 0.0062;

      torusGrp.position.set(
        Math.cos(angA) * OR,
        Math.sin(angA * 0.55) * 0.38,
        Math.sin(angA) * OR * 0.48
      );
      icoGrp.position.set(
        Math.cos(angB) * OR * 0.88,
        Math.sin(angB * 0.65) * 0.44,
        Math.sin(angB) * OR * 0.52
      );

      /* self-rotation — torus rocks, ico tumbles */
      torusGrp.rotation.y += 0.011;
      torusGrp.rotation.z += 0.005;
      icoGrp.rotation.y   += 0.009;
      icoGrp.rotation.x   += 0.007;

      /* proximity detection → scale boost + fill brighten + line fade-in */
      const dx = torusGrp.position.x - icoGrp.position.x;
      const dy = torusGrp.position.y - icoGrp.position.y;
      const dz = torusGrp.position.z - icoGrp.position.z;
      const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
      const prox = Math.max(0, 1 - dist / 1.4);           /* 0 → 1 as objects close in  */
      const sc   = 1 + prox * 0.13;
      torusGrp.scale.setScalar(sc);
      icoGrp.scale.setScalar(sc);
      icoFill.material.opacity = 0.10 + prox * 0.10;
      lMat.opacity = prox * 0.30;
      lBuf[0] = torusGrp.position.x; lBuf[1] = torusGrp.position.y; lBuf[2] = torusGrp.position.z;
      lBuf[3] = icoGrp.position.x;   lBuf[4] = icoGrp.position.y;   lBuf[5] = icoGrp.position.z;
      lGeo.attributes.position.needsUpdate = true;

      /* drift ambient particles */
      for (let i = 0; i < NPQ10; i++) {
        pA[i] += pSp[i];
        pPos[i*3]   = Math.cos(pA[i]) * pR[i];
        pPos[i*3+1] = Math.sin(pA[i]) * pR[i] * 0.52;
        pPos[i*3+2] = pZ[i];
      }
      pGeo.attributes.position.needsUpdate = true;
    };
  });

})();

/* ═══════════════════════════════════════════════════════
   STACKING CARDS TRANSITION  (Option 6)
   Last question card + history cards cascade to a deck,
   then the result polaroid rises from within the stack.
═══════════════════════════════════════════════════════ */
function triggerStackingTransition() {
  /* ── overlay shell ─────────────────────────── */
  const overlay = document.createElement('div');
  overlay.style.cssText = [
    'position:fixed;inset:0;z-index:4000;',
    'background:#FEFCFA;',
    'opacity:0;transition:opacity 0.35s ease;',
    'overflow:hidden;',
  ].join('');

  /* soft rose radial bg */
  const bgEl = document.createElement('div');
  bgEl.style.cssText = [
    'position:absolute;inset:0;',
    'background:radial-gradient(ellipse at 50% 40%, rgba(200,64,90,0.10) 0%, rgba(242,160,176,0.06) 50%, transparent 80%);',
  ].join('');
  overlay.appendChild(bgEl);

  /* Three.js canvas */
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;';
  overlay.appendChild(canvas);

  /* ── DOM result polaroid (rises over the deck) ─ */
  const polaroidWrap = document.createElement('div');
  polaroidWrap.style.cssText = [
    'position:absolute;left:50%;bottom:-380px;',
    'transform:translateX(-50%) rotate(2.5deg);',
    'width:min(220px,calc(100vw - 80px));',
    'z-index:20;opacity:0;transition:none;',
    'will-change:bottom,opacity;',
  ].join('');
  polaroidWrap.innerHTML = `
    <div style="
      background:linear-gradient(180deg,#f7ede0 0%,#ede2d0 100%);
      border-radius:14px;padding:8px 8px 22px;
      box-shadow:rgba(200,64,90,0.12) 0 8px 32px,
                 rgba(0,0,0,0.06) 0 2px 8px;
    ">
      <div style="border-radius:8px;overflow:hidden;height:158px;position:relative;">
        <div style="position:absolute;inset:0;
          background:linear-gradient(145deg,#FDF0F2 0%,#F2A0B0 50%,#C8405A 100%);"></div>
        <div style="position:absolute;bottom:0;left:-40%;width:180%;height:60%;
          background:radial-gradient(50% 50%,rgba(200,64,90,0.25) 20%,rgba(200,64,90,0));"></div>
        <div style="position:absolute;bottom:0;right:-40%;width:130%;height:50%;
          background:radial-gradient(50% 50%,rgba(196,146,58,0.18),rgba(196,146,58,0));"></div>
        <div style="position:absolute;bottom:0;left:0;right:0;padding:20px 8px 7px;
          background:linear-gradient(transparent,rgba(28,16,22,0.45));
          font-size:10px;font-weight:500;color:#fff;text-align:center;
          font-family:'DM Sans',sans-serif;letter-spacing:0.04em;">
          Avoidant · Competitive</div>
      </div>
    </div>`;
  overlay.appendChild(polaroidWrap);

  document.body.appendChild(overlay);

  /* fade-in overlay, then kick off Three.js */
  requestAnimationFrame(() => {
    overlay.style.opacity = '1';
    setTimeout(() => _runStackingAnimation(canvas, overlay, polaroidWrap), 120);
  });
}

function _runStackingAnimation(canvas, overlay, polaroidWrap) {
  const W   = window.innerWidth;
  const H   = window.innerHeight;
  const DPR = Math.min(window.devicePixelRatio, 2);

  const isMobStack = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: !isMobStack, alpha: true });
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(DPR, isMobStack ? 1.5 : 2));
  renderer.shadowMap.enabled = false; /* cards use MeshBasicMaterial — no shadows needed */

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(38, W / H, 0.1, 60);
  camera.position.set(0, 0, 9);

  /* ── lights ── */
  scene.add(new THREE.AmbientLight(0xffffff, 0.55));
  const key = new THREE.DirectionalLight(0xfff5e8, 1.6);
  key.position.set(2, 4, 7);
  key.castShadow = true;
  key.shadow.mapSize.set(512, 512);
  key.shadow.camera.near = 1; key.shadow.camera.far = 20;
  [-4, 4].forEach(v => { key.shadow.camera.left = key.shadow.camera.bottom = v; });
  key.shadow.camera.right = key.shadow.camera.top = 4;
  scene.add(key);
  const fill = new THREE.DirectionalLight(0xF2A0B0, 0.30);
  fill.position.set(-3, -2, 5);
  scene.add(fill);

  /* ── shadow floor ── */
  const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(20, 20),
    new THREE.ShadowMaterial({ opacity: 0.28 })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = -4.2;
  floor.receiveShadow = true;
  scene.add(floor);

  /* ── card geometry & texture factory ── */
  const CW = 2.0, CH = 2.68, CD = 0.05;

  const Q_GRADS = [
    ['#FDF0F2','#C8405A'], ['#F5EDE8','#8C6870'], ['#FDF0F2','#F2A0B0'],
    ['#FBF6F0','#C4923A'], ['#F5EAF0','#8C5070'], ['#FBF6F0','#EAC898'],
    ['#F5EDE8','#D4A8A0'], ['#FBF6F0','#C4923A'], ['#F7D6DC','#C8405A'],
    ['#F9E8EC','#7D1A2E'], ['#F5EAF0','#C89AB0'],
  ];

  function makeGradTex(top, bot) {
    const c = document.createElement('canvas');
    c.width = 256; c.height = 350;
    const ctx = c.getContext('2d');
    const g = ctx.createLinearGradient(0, 0, 0, 350);
    g.addColorStop(0, top); g.addColorStop(1, bot);
    ctx.fillStyle = g; ctx.fillRect(0, 0, 256, 350);
    /* rose glow */
    const r1 = ctx.createRadialGradient(30, 350, 0, 30, 350, 180);
    r1.addColorStop(0, 'rgba(200,64,90,0.22)'); r1.addColorStop(1, 'rgba(200,64,90,0)');
    ctx.fillStyle = r1; ctx.fillRect(0, 0, 256, 350);
    /* gold glow */
    const r2 = ctx.createRadialGradient(226, 350, 0, 226, 350, 150);
    r2.addColorStop(0, 'rgba(196,146,58,0.18)'); r2.addColorStop(1, 'rgba(196,146,58,0)');
    ctx.fillStyle = r2; ctx.fillRect(0, 0, 256, 350);
    /* subtle inner border */
    ctx.strokeStyle = 'rgba(200,64,90,0.15)';
    ctx.lineWidth = 7; ctx.strokeRect(3.5, 3.5, 249, 343);
    return new THREE.CanvasTexture(c);
  }

  function makeBackTex() {
    const c = document.createElement('canvas');
    c.width = 256; c.height = 350;
    const ctx = c.getContext('2d');
    const g = ctx.createLinearGradient(0, 0, 0, 350);
    g.addColorStop(0, '#ffffff'); g.addColorStop(1, '#e5e5e5');
    ctx.fillStyle = g; ctx.fillRect(0, 0, 256, 350);
    return new THREE.CanvasTexture(c);
  }

  /* visible scene height at z=0 with this camera */
  const visH = 2 * Math.tan(19 * Math.PI / 180) * camera.position.z;
  /* deck rests near bottom: top of bottom-most card sits at ~-2.0 */
  const DECK_Y = -(visH / 2) + CH * 0.78;

  /* ── build 11 question cards ── */
  const NUM_CARDS = 11;
  const cardMeshes = [];

  for (let i = 0; i < NUM_CARDS; i++) {
    const [top, bot] = Q_GRADS[i % Q_GRADS.length];
    const geo  = new THREE.BoxGeometry(CW, CH, CD);
    const mats = [
      new THREE.MeshLambertMaterial({ color: 0xf0e4e8 }),
      new THREE.MeshLambertMaterial({ color: 0xf0e4e8 }),
      new THREE.MeshLambertMaterial({ color: 0xfbf6f0 }),
      new THREE.MeshLambertMaterial({ color: 0xfbf6f0 }),
      new THREE.MeshPhongMaterial({ map: makeGradTex(top, bot), shininess: 35 }),
      new THREE.MeshPhongMaterial({ map: makeBackTex(), shininess: 18 }),
    ];
    const mesh = new THREE.Mesh(geo, mats);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    mesh.position.set(0, 2.0, -i * 0.06);  /* start above center */
    mesh.visible = false;
    scene.add(mesh);
    cardMeshes.push(mesh);
  }

  /* ── easing helpers ── */
  function eOut3(t)   { return 1 - (1 - t) ** 3; }
  function eIO3(t)    { return t < 0.5 ? 4*t*t*t : 1 - ((-2*t+2)**3)/2; }
  function lerp(a, b, t) { return a + (b - a) * t; }

  /* ── per-card stack targets ── */
  const stackTargets = cardMeshes.map((_, i) => ({
    y:  DECK_Y + i * 0.028,
    z:  -i * 0.05,
    rz: (i % 2 === 0 ? 1 : -1) * (0.018 + i * 0.007),
    rx: -0.04,
  }));

  /* ── timing constants (seconds) ── */
  const ENTER_START    = 0.25;
  const ENTER_DUR      = 0.60;
  const STAGGER        = 0.10;
  const COMPRESS_START = ENTER_START + NUM_CARDS * STAGGER + ENTER_DUR - 0.25;
  const COMPRESS_DUR   = 0.70;
  const SHUFFLE_START  = COMPRESS_START + COMPRESS_DUR + 0.05;
  const RESULT_START   = SHUFFLE_START + 0.55;
  const FADEOUT_START  = RESULT_START  + 1.90;

  let elapsed      = 0;
  let resultShown  = false;
  let navScheduled = false;
  let animStopped  = false;
  let lastTime     = performance.now();

  function tick(now) {
    if (animStopped) return;
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;
    elapsed += dt;

    /* ── Phase 1: cards enter from above, cascade to stack ── */
    cardMeshes.forEach((mesh, i) => {
      const enterAt = ENTER_START + i * STAGGER;
      if (elapsed < enterAt) return;

      mesh.visible = true;
      const tgt = stackTargets[i];
      let targetY  = tgt.y;
      let targetRz = tgt.rz;
      let targetZ  = tgt.z;

      /* Phase 2: compress */
      if (elapsed >= COMPRESS_START) {
        const ct  = Math.min(1, (elapsed - COMPRESS_START) / COMPRESS_DUR);
        const cet = eIO3(ct);
        targetY  = lerp(tgt.y,  DECK_Y + i * 0.016,                           cet);
        targetRz = lerp(tgt.rz, (i % 2 === 0 ? 1 : -1) * i * 0.006,          cet);
        targetZ  = lerp(tgt.z,  -i * 0.06,                                     cet);
      }

      /* Phase 3: shuffle wobble */
      if (elapsed >= SHUFFLE_START) {
        const st    = elapsed - SHUFFLE_START;
        const decay = Math.exp(-st * 2.8);
        const wobble = Math.sin(st * 6.2 + i * 1.15) * 0.014 * decay;
        mesh.rotation.z = targetRz + wobble;
        mesh.position.y = targetY + Math.sin(st * 5.1 + i * 0.75) * 0.007 * decay;
        mesh.position.z = targetZ;
        mesh.rotation.x = tgt.rx;
        return;
      }

      /* plain enter */
      const et = eOut3(Math.min(1, (elapsed - enterAt) / ENTER_DUR));
      mesh.position.y  = lerp(2.0, targetY,  et);
      mesh.position.z  = targetZ;
      mesh.rotation.z  = lerp(0,   targetRz, et);
      mesh.rotation.x  = tgt.rx;
    });

    /* ── Phase 4: DOM polaroid rises ── */
    if (elapsed >= RESULT_START && !resultShown) {
      resultShown = true;
      polaroidWrap.style.transition =
        'bottom 1.35s cubic-bezier(0.22,1,0.36,1), opacity 0.55s ease';
      polaroidWrap.style.bottom  = '33%';
      polaroidWrap.style.opacity = '1';
    }

    /* ── Phase 5: fade out & navigate ── */
    if (elapsed >= FADEOUT_START && !navScheduled) {
      navScheduled = true;
      overlay.style.transition      = 'opacity 0.65s ease';
      overlay.style.opacity         = '0';
      polaroidWrap.style.transition = 'opacity 0.65s ease';
      polaroidWrap.style.opacity    = '0';
      setTimeout(() => {
        animStopped = true;
        renderer.dispose();
        window.location.href = 'result.html';
      }, 680);
    }

    renderer.render(scene, camera);
    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
}

render();
</script>
